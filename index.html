<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  
  <meta charset="utf-8" />
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sacrament Meeting — Ward Program</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a id="strip-learn-more" class="strip-learn-more floating-learn-more" href="https://www.churchofjesuschrist.org/comeuntochrist" target="_blank" rel="noopener noreferrer">Learn More</a>

  <div class="mobile-scroll-strip" aria-hidden="true"></div>

  <div class="menu-overlay" id="menu-overlay" hidden>
    <aside class="side-menu" id="side-menu" aria-label="Navigation menu">
      <div class="side-menu-header">
        <img src="icons/logo.png" alt="Site logo" class="side-menu-logo" onerror="this.style.display='none'">
        <button id="menu-close" class="menu-close" type="button" aria-label="Close menu">✕</button>
      </div>
      <nav class="side-menu-nav" aria-label="Section shortcuts">
        <button class="side-menu-link" data-section="program" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
          <span>Service Program</span>
        </button>
        <button class="side-menu-link" data-section="announcements-section" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12l12-5v10L4 12zm12 2v4a2 2 0 0 1-2 2h-1"/></svg>
          <span>Announcements</span>
        </button>
        <button class="side-menu-link" data-section="activities-section" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
          <span>Activities &amp; Events</span>
        </button>
        <button class="side-menu-link" data-section="leaders-section" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c1.5-3.5 4.3-5 8-5s6.5 1.5 8 5"/></svg>
          <span>Ward Leadership</span>
        </button>
        <a id="side-ward-homepage" class="side-menu-home-link" href="#" target="_blank" rel="noopener" hidden>Ward Homepage</a>
      </nav>
    </aside>
    <button id="menu-scrim" class="menu-scrim" type="button" aria-label="Close menu"></button>
  </div>

  <img id="church-logo" src="icons/logo.png" alt="Site logo" onerror="this.style.display='none'">

  <main id="app" class="app">
    <!-- Top hero / header -->
    <header class="hero">
      <div class="hero-media">
        <img class="hero-image" src="images/banner-picture.png" alt="Top banner image">
      </div>
      <button id="share-btn" class="share-btn" aria-haspopup="true" aria-expanded="false" title="Share this page">
        <img src="icons/share.png" alt="Share" aria-hidden="true">
      </button>
      <button id="menu-open" class="menu-open" type="button" aria-label="Open menu">☰</button>
      <div class="hero-inner">
        <div class="hero-text">
          <h1 id="meeting-heading" class="meeting-heading">Sacrament Meeting</h1>
          <div id="ward-details" class="ward-details">Ward details</div>
          <div class="meeting-meta" aria-label="Meeting details">
            <div id="meeting-date" class="meeting-date">Loading…</div>
            <div id="meeting-time" class="meeting-time" aria-hidden="true"></div>
          </div>
          <div id="visitor-line" class="visitor-line" aria-hidden="false">
            <span class="visitor-text">Visitor?</span>
            <a id="come-link" class="btn-accent" href="https://www.churchofjesuschrist.org/comeuntochrist" target="_blank" rel="noopener noreferrer" style="margin-left:10px;">
              Learn more here
            </a>
          </div>
        </div>
      </div>
      
      <div id="share-menu" class="share-menu" role="menu" aria-hidden="true" aria-qr="false">
        <div id="share-email" class="share-action" role="menuitem">
          <img src="icons/email.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>Email</span>
        </div>
      
        <div id="share-link" class="share-action" role="menuitem">
          <img src="icons/link.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>Link</span>
        </div>

        <div id="share-qr" class="share-action" role="menuitem">
          <img src="icons/qrcode.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>QR Code</span>
        </div>
      
        <div class="qr-preview" aria-hidden="true">
          <img id="share-qr-img" src="" alt="QR code">
        </div>
      
        <div id="share-status" class="muted-small" style="padding:6px 6px 0 6px; display:none;"></div>
      </div>
    </header>

    <div class="meta-box">
      <div class="meta-line" id="presiding-line">
        <strong>Presiding:</strong> <span id="presiding"></span>
      </div>
    
      <div class="meta-line" id="conducting-line">
        <strong>Conducting:</strong> <span id="conducting"></span>
      </div>
    </div>
    
    <div class="meta-extra">
      <div class="meta-left" id="chorister-line">
        <strong>Chorister:</strong> <span id="chorister"></span>
      </div>
    
      <div class="meta-right" id="organist-line">
        <strong>Organist:</strong> <span id="organist"></span>
      </div>
    </div>

    <section id="program" class="card program">
      <div id="program-content" class="program-content">
        <div class="placeholder">
          <p class="muted">No agenda items loaded yet. When Agenda is configured the program will appear here.</p>
        </div>
      </div>
    </section>

    <section class="bottom-content-zone" aria-label="Program resources and contacts">
      <section class="card collapsible" id="activities-section">
        <button class="collapsible-toggle" data-target="activities-panel" aria-expanded="false" type="button">
          <span>Activities &amp; Events</span>
          <svg class="chev" viewBox="0 0 24 24" width="18" height="18" aria-hidden><path fill="none" stroke="#fff" stroke-width="2" d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="activities-panel" class="collapsible-panel">
          <div id="activities-list" class="list"></div>
          <div class="muted small">No activities yet.</div>
        </div>
      </section>

      <section class="card collapsible" id="leaders-section">
        <button class="collapsible-toggle" data-target="leaders-panel" aria-expanded="false" type="button">
          <span>Ward Leadership</span>
          <svg class="chev" viewBox="0 0 24 24" width="18" height="18" aria-hidden><path fill="none" stroke="#fff" stroke-width="2" d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="leaders-panel" class="collapsible-panel">
          <div id="leaders-list" class="list"></div>
        </div>
      </section>

      <div id="info-note" class="notice" role="status" hidden></div>
    </section>

    <footer class="footer-brand-zone" aria-label="Ward footer">
      <div class="footer-brand-inner">
        <img src="icons/footer-logo.png" alt="Ward logo" id="footer-logo" />
        <p id="footer-ward-site" class="footer-ward-site" hidden></p>
      </div>
    </footer>
    
  </main>

  <script src="js/app.js"></script>
</body>
</html>
