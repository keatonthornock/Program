<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  
  <meta charset="utf-8" />
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sacrament Meeting — Ward Program</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="app" class="app">
    <!-- Top hero / header -->
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-text">
          <!-- larger logo above the heading, and allowed to be transparent -->
          <img id="church-logo" src="logo.png" alt="Church logo" onerror="this.style.display='none'">
          <h1 id="meeting-heading" class="meeting-heading">Sacrament Meeting</h1>
          <div id="meeting-date" class="meeting-date">Loading…</div>
          <div id="meeting-time" class="meeting-time" aria-hidden="true"></div>
          <div id="visitor-line" class="visitor-line" aria-hidden="false">
            <span class="visitor-text">Visitor?</span>
            <a id="come-link" class="btn-accent" href="https://www.churchofjesuschrist.org/comeuntochrist" target="_blank" rel="noopener noreferrer" style="margin-left:10px;">
              Learn more here
            </a>
          </div>
          <button id="share-btn" class="share-btn" aria-haspopup="true" aria-expanded="false" title="Share this page">
            <img src="images/share.svg" alt="Share" aria-hidden="true">
          </button>
        </div>
      </div>
      
      <div id="share-menu" class="share-menu" role="menu" aria-hidden="true" aria-qr="false">
        <div id="share-email" class="share-action" role="menuitem">
          <img src="icons/email.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>Email</span>
        </div>
      
        <div id="share-qr" class="share-action" role="menuitem">
          <img src="icons/qrcode.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>QR Code</span>
        </div>
      
        <div id="share-link" class="share-action" role="menuitem">
          <img src="icons/link.svg" alt="" aria-hidden="true" style="width:20px;height:20px">
          <span>Link</span>
        </div>
      
        <div class="qr-preview" aria-hidden="true">
          <img id="share-qr-img" src="" alt="QR code">
        </div>
      
        <div id="share-status" class="muted-small" style="padding:6px 6px 0 6px; display:none;"></div>
      </div>
    </header>

    <!-- Presiding / Conducting -->
    <div class="meta-box">
      <div class="meta-line" id="presiding-line">
        <strong>Presiding:</strong> <span id="presiding"></span>
      </div>
    
      <div class="meta-line" id="conducting-line">
        <strong>Conducting:</strong> <span id="conducting"></span>
      </div>
    </div>
    
    <div class="meta-extra">
      <div class="meta-left" id="chorister-line">
        <strong>Chorister:</strong> <span id="chorister"></span>
      </div>
    
      <div class="meta-right" id="organist-line">
        <strong>Organist:</strong> <span id="organist"></span>
      </div>
    </div>

    <!-- Program / agenda -->
    <section id="program" class="card program">
      <!-- Program content will be injected here by JS -->
      <div id="program-content" class="program-content">
        <div class="placeholder">
          <p class="muted">No agenda items loaded yet. When Agenda is configured the program will appear here.</p>
        </div>
      </div>
    </section>

    <!-- Collapsible Activities -->
    <section class="card collapsible" id="activities-section">
      <button class="collapsible-toggle" data-target="activities-panel">
        <span>Activities &amp; Events</span>
        <svg class="chev" viewBox="0 0 24 24" width="18" height="18" aria-hidden><path fill="none" stroke="#fff" stroke-width="2" d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="activities-panel" class="collapsible-panel">
        <div id="activities-list" class="list"></div>
        <div class="muted small">No activities yet.</div>
      </div>
    </section>

    <!-- Collapsible Ward Leadership -->
    <section class="card collapsible" id="leaders-section">
      <button class="collapsible-toggle" data-target="leaders-panel">
        <span>Ward Leadership</span>
        <svg class="chev" viewBox="0 0 24 24" width="18" height="18" aria-hidden><path fill="none" stroke="#fff" stroke-width="2" d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="leaders-panel" class="collapsible-panel">
        <div id="leaders-list" class="list"></div>
      </div>
    </section>

    <div id="info-note" class="notice" role="status" hidden></div>

    <footer id="site-footer" class="site-footer" aria-label="Footer">
      <img src="images/footer-logo.png" alt="" id="footer-logo" />
    </footer>
    
  </main>

  <script src="js/app.js"></script>
</body>
</html>
